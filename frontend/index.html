<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Translate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="translator-container">
        <header>
            <h1 class="logo">Aura <span>Translate</span></h1>
            <p class="subtitle">Seamless communication across borders</p>
        </header>

        <div class="translator-card">
            <div class="controls-row">
                <div class="select-wrapper">
                    <select id="source-lang" aria-label="Source Language">
                        <option value="en" selected>English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="ar">Arabic</option>
                        <!-- Add more languages as needed -->
                    </select>
                </div>

                <button class="swap-btn" aria-label="Swap Languages" id="swap-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
                    </svg>
                </button>

                <div class="select-wrapper">
                    <select id="target-lang" aria-label="Target Language">
                        <option value="es" selected>Spanish</option>
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="ar">Arabic</option>
                        <!-- Add more languages as needed -->
                    </select>
                </div>
            </div>

            <div class="text-areas-row">
                <div class="input-section">
                    <textarea id="input-text" placeholder="Type or paste your text here..." spellcheck="false"></textarea>
                    <div class="character-count">0 / 5000</div>
                </div>

                <div class="output-section">
                    <textarea id="output-text" placeholder="Translation will appear here..." readonly></textarea>
                </div>
            </div>

            <div class="actions-row">
                <button class="translate-btn" id="translate-btn">
                    <span>Translate</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
